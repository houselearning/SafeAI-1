<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dolores - Nerevions Assistant</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.38.1/min/vs/editor/editor.main.css">
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.38.1/min/vs/loader.js"></script>
<style>
*{box-sizing:border-box;}
body,html{margin:0;padding:0;font-family:Arial,sans-serif;background:#1b0f33;color:white;overflow-x:hidden;}

/* Splash */
#splash{position:fixed;top:0;left:0;width:100%;height:100%;background:#1b0f33;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999;transition:opacity 0.6s;}
#splash h1{font-family:'Brush Script MT',cursive;font-size:60px;background:linear-gradient(135deg,#7a2cff,#d38cff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;opacity:0;animation:fadeIn 2s forwards;}
#splash span#subtitle{opacity:0;margin-top:10px;font-size:20px;animation:fadeIn 2s 2s forwards;}
@keyframes fadeIn{to{opacity:1;}}

/* Main */
#main{display:none;padding:20px;padding-bottom:100px;}
#recentChatsGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-top:20px;}
.chatCard{background:#2b1a54;padding:16px;border-radius:12px;cursor:pointer;transition:transform 0.2s;position:relative;}
.chatCard:hover{transform:scale(1.03);}
.chatThumbnail{width:100%;height:100px;background:#7a2cff33;border-radius:8px;margin-bottom:10px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:32px;color:white;}
.chatSummary{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.deleteCardBtn{position:absolute;top:8px;right:8px;background:rgba(122,44,255,0.3);border:none;color:#d38cff;border-radius:50%;width:24px;height:24px;font-size:13px;cursor:pointer;display:none;align-items:center;justify-content:center;}
.chatCard:hover .deleteCardBtn{display:flex;}
.deleteCardBtn:hover{background:rgba(200,0,100,0.5);}
.emptyState{color:#9977cc;font-size:16px;margin-top:20px;}

/* Ask Bar */
#askBar{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);display:flex;align-items:center;background:#2b1a54;border-radius:30px;padding:10px 20px;width:90%;max-width:900px;font-size:18px;z-index:5000;box-shadow:0 4px 30px rgba(122,44,255,0.4);}
#askBar .cursiveD{font-family:'Brush Script MT',cursive;font-size:28px;background:linear-gradient(135deg,#7a2cff,#d38cff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-right:10px;flex-shrink:0;}
#askBar input{flex:1;background:transparent;border:none;color:white;font-size:18px;outline:none;padding-left:10px;}
#askBar input::placeholder{color:#9977cc;}
#askBar .sendBtn{background:linear-gradient(135deg,#7a2cff,#d38cff);border:none;color:white;padding:8px 16px;border-radius:20px;margin-left:10px;cursor:pointer;font-size:15px;}
#askBar #micBtn{background:rgba(122,44,255,0.3);border:1px solid rgba(122,44,255,0.5);color:#d38cff;padding:8px 12px;border-radius:50%;margin-left:8px;cursor:pointer;font-size:16px;transition:all 0.2s;}
#askBar #micBtn.listening{background:rgba(200,50,255,0.6);animation:pulse 1s infinite;}
#askBar #settingsBtn{margin-left:8px;background:#7a2cff;color:white;border:none;padding:8px 12px;border-radius:50%;cursor:pointer;font-size:16px;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(200,50,255,0.5);}50%{box-shadow:0 0 0 10px rgba(200,50,255,0);}}

/* Voice Orb */
#voiceOrb{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:8000;flex-direction:column;align-items:center;gap:20px;}
#orbCircle{width:140px;height:140px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#c77dff,#7a2cff,#3b0080);box-shadow:0 0 40px rgba(180,80,255,0.8),0 0 80px rgba(120,30,255,0.4);animation:orbPulse 1.5s ease-in-out infinite;}
#orbLabel{font-family:'Brush Script MT',cursive;font-size:26px;background:linear-gradient(135deg,#7a2cff,#d38cff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
#orbStatus{font-size:13px;color:#9977cc;letter-spacing:0.08em;}
#orbClose{background:none;border:1px solid rgba(122,44,255,0.4);color:#9977cc;border-radius:20px;padding:6px 18px;cursor:pointer;font-size:13px;margin-top:4px;}
#orbClose:hover{color:#d38cff;border-color:#d38cff;}
@keyframes orbPulse{0%,100%{box-shadow:0 0 40px rgba(180,80,255,0.8),0 0 80px rgba(120,30,255,0.4);transform:scale(1);}50%{box-shadow:0 0 60px rgba(200,100,255,1),0 0 120px rgba(150,50,255,0.6);transform:scale(1.07);}}
#voiceOrb.active #orbCircle{animation:orbPulse 0.8s ease-in-out infinite;}

/* Chat */
#chatOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:2000;background:#1b0f33;flex-direction:column;align-items:center;}
#chatHeader{width:100%;max-width:700px;display:flex;justify-content:space-between;align-items:center;padding:14px 20px;flex-shrink:0;}
#chatHeader .chatTitle{font-size:15px;color:#9977cc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80%;}
#chatHeader .closeBtn{font-size:22px;background:none;border:none;color:#9977cc;cursor:pointer;}
#chatContent{display:flex;flex-direction:column;gap:10px;flex:1;overflow-y:auto;width:100%;max-width:700px;padding:0 20px 20px;}
#chatContent::after{content:'';display:block;height:80px;flex-shrink:0;}
.userMsg{background:#7a2cff88;align-self:flex-end;padding:10px 14px;border-radius:16px 16px 4px 16px;max-width:80%;line-height:1.5;word-break:break-word;white-space:pre-wrap;}
.doloresMsg{background:#4b2f8c;align-self:flex-start;padding:10px 14px;border-radius:16px 16px 16px 4px;max-width:80%;line-height:1.5;word-break:break-word;white-space:pre-wrap;}

/* Typing dots */
.typingDots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:#d38cff;margin:0 2px;animation:bounce 1.2s infinite;}
.typingDots span:nth-child(2){animation-delay:0.2s;}
.typingDots span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-6px);}}

/* File cards */
.fileCard{background:#3b2a70;padding:12px;border-radius:10px;display:flex;justify-content:space-between;align-items:center;margin-top:4px;align-self:stretch;}
.fileCard:hover{background:#4b2f8c;}
.fileName{font-weight:bold;color:#d38cff;}
.fileActions button{margin-left:6px;padding:4px 10px;border:none;border-radius:6px;background:#7a2cff;color:white;cursor:pointer;font-size:13px;}

/* Code Preview */
#fileEditorOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,5,25,0.88);backdrop-filter:blur(10px);z-index:4000;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
#codePanel{width:90%;max-width:820px;height:82vh;display:flex;flex-direction:column;border-radius:12px;overflow:hidden;border:1px solid rgba(122,44,255,0.4);box-shadow:0 24px 80px rgba(90,20,200,0.4);}
#codePanelHeader{display:flex;align-items:center;justify-content:space-between;background:#1a0f2e;padding:10px 16px;border-bottom:1px solid rgba(122,44,255,0.35);flex-shrink:0;}
#codePanelLeft{display:flex;align-items:center;gap:10px;}
#codePanelDots{display:flex;gap:6px;}
.dot{width:12px;height:12px;border-radius:50%;}
.dot.red{background:#9b5de5;}.dot.yellow{background:#c77dff;}.dot.green{background:#e0aaff;}
#codePanelFilename{font-family:'SF Mono',monospace;font-size:13px;color:#d38cff;font-weight:500;}
#codePanelLang{font-size:11px;color:#9b5de5;background:rgba(122,44,255,0.2);border:1px solid rgba(122,44,255,0.35);padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:0.05em;}
#codePanelActions{display:flex;gap:8px;align-items:center;}
.panelBtn{background:rgba(122,44,255,0.2);border:1px solid rgba(122,44,255,0.4);color:#d38cff;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:5px;transition:background 0.15s;}
.panelBtn:hover{background:rgba(122,44,255,0.4);}
.panelBtn.close{background:transparent;border:none;font-size:18px;color:#9b5de5;padding:4px 8px;}
.panelBtn.close:hover{color:#d38cff;}
#editorContainer{flex:1;overflow:hidden;background:#1e1e2e;}
#runOutput{display:none;background:#0d0d1a;border-top:1px solid rgba(122,44,255,0.3);padding:12px 16px;font-family:'SF Mono',monospace;font-size:13px;color:#a0f0a0;max-height:150px;overflow-y:auto;white-space:pre-wrap;}

/* Toast */
#copiedToast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#7a2cff,#d38cff);color:white;padding:8px 20px;border-radius:20px;font-size:14px;font-weight:600;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:9999;}
#copiedToast.show{opacity:1;}
/* Mode indicator */
#modeToast{position:fixed;top:14px;right:14px;background:rgba(27,15,51,0.85);border:1px solid rgba(122,44,255,0.4);color:#d38cff;padding:5px 14px;border-radius:20px;font-size:12px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:9999;}
#modeToast.show{opacity:1;}

/* Settings */
#settingsOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);z-index:6000;overflow:auto;}
#settingsPanel{margin:40px auto;width:90%;max-width:700px;background:#1b0f33;padding:30px;border-radius:12px;color:white;position:relative;border:1px solid rgba(122,44,255,0.3);}
#settingsPanel h2{margin-top:0;background:linear-gradient(135deg,#7a2cff,#d38cff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
#settingsPanel label{display:flex;align-items:center;gap:8px;margin-top:14px;cursor:pointer;}
#settingsPanel input[type=checkbox]{width:16px;height:16px;accent-color:#7a2cff;}
.settingsBtn{margin-top:16px;padding:8px 16px;border:none;border-radius:8px;background:rgba(122,44,255,0.3);border:1px solid rgba(122,44,255,0.5);color:#d38cff;cursor:pointer;font-size:14px;display:block;transition:background 0.2s;}
.settingsBtn:hover{background:rgba(122,44,255,0.5);}
.settingsBtn.danger{background:rgba(180,0,60,0.3);border-color:rgba(200,0,80,0.5);color:#ff8080;}
.settingsBtn.danger:hover{background:rgba(200,0,60,0.5);}
.settingsDivider{border:none;border-top:1px solid rgba(122,44,255,0.2);margin:20px 0;}
</style>
</head>
<body>

<!-- Splash -->
<div id="splash">
  <h1>Dolores</h1>
  <span id="subtitle">Nerevions Assistant</span>
</div>

<!-- Main -->
<div id="main">
  <h1>Recent Chats</h1>
  <div id="recentChatsGrid"></div>
</div>

<!-- Chat -->
<div id="chatOverlay">
  <div id="chatHeader">
    <span class="chatTitle" id="chatTitleText">Chat</span>
    <button class="closeBtn" onclick="closeChat()">✖</button>
  </div>
  <div id="chatContent"></div>
</div>

<!-- Voice Orb -->
<div id="voiceOrb">
  <div id="orbCircle"></div>
  <div id="orbLabel">Dolores</div>
  <div id="orbStatus">Listening...</div>
  <button id="orbClose" onclick="stopWakeListening()">Dismiss</button>
</div>

<!-- Code Preview -->
<div id="fileEditorOverlay">
  <div id="codePanel">
    <div id="codePanelHeader">
      <div id="codePanelLeft">
        <div id="codePanelDots">
          <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
        </div>
        <span id="codePanelFilename">untitled</span>
        <span id="codePanelLang">text</span>
      </div>
      <div id="codePanelActions">
        <button class="panelBtn" onclick="runCode()">▶ Run</button>
        <button class="panelBtn" onclick="copyCode()">⎘ Copy</button>
        <button class="panelBtn" onclick="downloadCurrentFile()">↓ Download</button>
        <button class="panelBtn close" onclick="closeFileEditor()">✕</button>
      </div>
    </div>
    <div id="editorContainer"></div>
    <div id="runOutput"></div>
  </div>
</div>
<div id="copiedToast">Copied!</div>
<div id="modeToast"></div>

<!-- Ask Bar -->
<div id="askBar">
  <span class="cursiveD">D</span>
  <input type="text" id="userInput" placeholder="Ask Dolores..." onkeydown="if(event.key==='Enter') askOrSend();" />
  <button class="sendBtn" onclick="askOrSend()">Send</button>
  <button id="micBtn" onclick="toggleMic()" title="Voice input">🎤</button>
  <button id="settingsBtn" onclick="openSettings()">⚙</button>
</div>

<!-- Settings -->
<div id="settingsOverlay">
  <div id="settingsPanel">
    <button style="position:absolute;top:14px;right:14px;font-size:20px;background:none;border:none;color:#9977cc;cursor:pointer;" onclick="closeSettings()">✖</button>
    <h2>Settings</h2>
    <hr class="settingsDivider">
    <label><input type="checkbox" id="voiceToggle" checked> Voice responses (Dolores speaks)</label>
    <label><input type="checkbox" id="voiceInputToggle" checked> Voice input (mic button)</label>
    <label><input type="checkbox" id="wakeWordToggle" checked> Wake word ("Dolores")</label>
    <label><input type="checkbox" id="typingAnimToggle" checked> Typing animation</label>
    <hr class="settingsDivider">
    <button class="settingsBtn danger" onclick="deleteAllData()">🗑 Delete All Dolores Data</button>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────
let knowledgeBase = {};
let recentChats = JSON.parse(localStorage.getItem("recentChats") || "[]");
let inChat = false;
let currentChatId = null;
let currentFile = null;
let editor = null;
let micRecognition = null;
let wakeRecognition = null;
let isListening = false;
let orbVisible = false;

// ── Knowledge Base ───────────────────────────────────────────────
const embeddedKB = {
  "javascript basics": "JavaScript is a high-level, interpreted language for web development. It supports ES6+ features like arrow functions, classes, async/await, and modules.",
  "javascript dom": "The DOM allows JS to manipulate HTML elements. Example: document.getElementById('id').innerText = 'Hello'; document.querySelector('.class').style.color = 'red';",

  "c++ basics": "C++ is a compiled, high-performance language. It supports OOP, templates, and the STL. Example: #include<iostream> int main() { std::cout << 'Hello'; return 0; }",
  "c++ advanced": "C++ advanced topics include pointers, references, memory management, templates, inheritance, polymorphism, move semantics, RAII, and smart pointers.",
  "java basics": "Java runs on the JVM and is a strongly typed OOP language. Example: public class Main { public static void main(String[] args) { System.out.println('Hello'); } }",
  "java advanced": "Java advanced topics include generics, concurrency, streams, lambdas, design patterns like Singleton and Observer, and Spring Boot for web apps.",
  "html basics": "HTML structures web pages using tags like div, p, and h1. Semantic HTML improves accessibility and SEO.",
  "css basics": "CSS styles pages using selectors, flexbox, grid, transitions, and animations. Example: div { display: flex; justify-content: center; }",
  "css advanced": "CSS advanced topics include custom properties (variables), keyframe animations, responsive design with media queries, and pseudo-elements like :before and :after.",
  "sql basics": "SQL manages relational databases using SELECT, INSERT, UPDATE, and DELETE. Example: SELECT name FROM users WHERE age > 18;",
  "sql advanced": "SQL advanced topics include joins, subqueries, indexes, transactions, normalization, views, stored procedures, and performance optimization.",
  "data structures": "Core data structures include arrays, linked lists, stacks, queues, trees, graphs, hash maps, and heaps. Always consider Big-O complexity.",
  "algorithms": "Key algorithms include sorting like quicksort and mergesort, searching like binary search and BFS/DFS, dynamic programming, recursion, and greedy algorithms.",
  "apis": "APIs allow software to communicate. Use fetch or axios in JS and requests in Python. Learn RESTful and GraphQL patterns.",
  "web development": "Web dev includes frontend with HTML, CSS, and JS plus frameworks, backend with Node.js, Django, Flask, or Spring Boot, and databases with SQL or NoSQL.",
  "machine learning": "Machine learning trains models on data to make predictions. Key libraries include scikit-learn, TensorFlow, and PyTorch.",
  "cloud computing": "Cloud providers AWS, Azure, and GCP offer storage, serverless functions, containers, virtual machines, and auto-scaling.",
  "network basics": "Networking fundamentals include TCP/IP, HTTP/HTTPS, DNS, client-server architecture, sockets, REST APIs, WebSockets, and SSL/TLS.",
  "security basics": "Security essentials include HTTPS, input sanitization, password hashing with bcrypt, JWT and OAuth2, CORS policies, and XSS and SQL injection prevention.",
  "math basics": "Math topics include algebra, geometry, calculus, probability, statistics, linear algebra, discrete math, and combinatorics.",
  "physics basics": "Physics covers mechanics, thermodynamics, electromagnetism, optics, and quantum mechanics basics.",
  "chemistry basics": "Chemistry covers the periodic table, chemical bonding, reactions, stoichiometry, acids and bases, and organic chemistry basics.",
  "biology basics": "Biology covers cell structure, genetics, evolution, human anatomy, and ecosystems.",
  "geography basics": "Geography covers continents, countries, capitals, major rivers and mountains, and time zones.",
  "history basics": "History covers major world events, ancient civilizations, wars, revolutions, and technological milestones.",

  "example java file": "// Java Example\npublic class Main {\n    public static String greet(String name) {\n        return \"Hello, \" + name + \"!\";\n    }\n\n    public static int add(int a, int b) {\n        return a + b;\n    }\n\n    public static void main(String[] args) {\n        System.out.println(greet(\"Dolores\"));\n        System.out.println(\"2 + 3 = \" + add(2, 3));\n    }\n}",
  "example c++ file": "// C++ Example\n#include <iostream>\n#include <string>\n\nstd::string greet(std::string name) {\n    return \"Hello, \" + name + \"!\";\n}\n\nint add(int a, int b) {\n    return a + b;\n}\n\nint main() {\n    std::cout << greet(\"Dolores\") << std::endl;\n    std::cout << \"2 + 3 = \" << add(2, 3) << std::endl;\n    return 0;\n}",

  "writing essay": "Essay structure: Introduction with hook and thesis, body paragraphs with topic sentence, evidence and analysis, then a conclusion that restates the thesis.",

knowledgeBase = { ...embeddedKB };
fetch("https://aidolores.github.io/smart.json")
  .then(r => r.json())
  .then(data => { knowledgeBase = { ...embeddedKB, ...data }; })
  .catch(() => {});

// ── First Visit: Request Mic Permission ──────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  // Request mic on first visit
  if (!localStorage.getItem("micAsked")) {
    localStorage.setItem("micAsked", "1");
    navigator.mediaDevices && navigator.mediaDevices.getUserMedia({ audio: true })
      .then(stream => { stream.getTracks().forEach(t => t.stop()); })
      .catch(() => {});
  }

  // Splash → Main
  setTimeout(() => {
    document.getElementById("splash").style.opacity = "0";
    setTimeout(() => {
      document.getElementById("splash").style.display = "none";
      document.getElementById("main").style.display = "block";
      renderRecentChats();
      startWakeWordListener();
    }, 600);
  }, 4000);
});

// ── Recent Chats ─────────────────────────────────────────────────
function saveChats() { localStorage.setItem("recentChats", JSON.stringify(recentChats)); }

function renderRecentChats() {
  const container = document.getElementById("recentChatsGrid");
  container.innerHTML = "";
  if (recentChats.length === 0) {
    container.innerHTML = '<p class="emptyState">No chats yet. Ask Dolores something!</p>';
    return;
  }
  recentChats.forEach(chat => {
    const card = document.createElement("div"); card.className = "chatCard";
    const thumb = document.createElement("div"); thumb.className = "chatThumbnail"; thumb.innerText = chat.title.slice(0,1).toUpperCase();
    const summary = document.createElement("div"); summary.className = "chatSummary"; summary.innerText = chat.title;
    const delBtn = document.createElement("button"); delBtn.className = "deleteCardBtn"; delBtn.innerText = "✕";
    delBtn.onclick = e => { e.stopPropagation(); deleteChat(chat.id); };
    card.appendChild(delBtn); card.appendChild(thumb); card.appendChild(summary);
    card.onclick = () => openChatById(chat.id);
    container.appendChild(card);
  });
}

function deleteChat(id) {
  recentChats = recentChats.filter(c => c.id !== id);
  saveChats(); renderRecentChats();
}

// ── Ask Bar ──────────────────────────────────────────────────────
function askOrSend() {
  const val = document.getElementById("userInput").value.trim();
  if (!val) return;
  document.getElementById("userInput").value = "";
  if (!inChat) startNewChat(val);
  else sendChatMessage(val);
}

// ── Chat ─────────────────────────────────────────────────────────
function startNewChat(firstMessage) {
  const id = Date.now().toString();
  const chat = { id, title: firstMessage.slice(0, 60), messages: [] };
  recentChats.unshift(chat);
  if (recentChats.length > 30) recentChats.pop();
  saveChats(); renderRecentChats();
  currentChatId = id;
  openChatUI(chat.title);
  sendChatMessage(firstMessage);
}

function openChatById(id) {
  const chat = recentChats.find(c => c.id === id);
  if (!chat) return;
  currentChatId = id;
  openChatUI(chat.title);
  const container = document.getElementById("chatContent");
  container.innerHTML = "";
  chat.messages.forEach(msg => {
    addChatMessage(msg.sender, msg.text);
    if (msg.file) renderFileCard(msg.file);
  });
}

function openChatUI(title) {
  inChat = true;
  document.getElementById("chatOverlay").style.display = "flex";
  document.getElementById("chatContent").innerHTML = "";
  document.getElementById("chatTitleText").innerText = title;
}

function closeChat() {
  inChat = false; currentChatId = null;
  document.getElementById("chatOverlay").style.display = "none";
}

function sendChatMessage(msg) {
  addChatMessage("user", msg);
  saveMessage("user", msg);
  doloresRespond(msg);
}

function saveMessage(sender, text, file = null) {
  if (!currentChatId) return;
  const chat = recentChats.find(c => c.id === currentChatId);
  if (!chat) return;
  const entry = { sender, text };
  if (file) entry.file = file;
  chat.messages.push(entry);
  saveChats();
}

function addChatMessage(sender, text, isTyping = false) {
  const container = document.getElementById("chatContent");
  const div = document.createElement("div");
  div.className = sender === "user" ? "userMsg" : "doloresMsg";
  if (isTyping) {
    div.innerHTML = '<div class="typingDots"><span></span><span></span><span></span></div>';
  } else {
    div.innerText = text; // innerText preserves spaces correctly when set all at once
  }
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

// ── Dolores Brain ────────────────────────────────────────────────
async function doloresRespond(input) {
  const typingDiv = addChatMessage("dolores", "", true);
  const apiKey = getApiKey();

  // Build conversation history for context
  const chat = recentChats.find(c => c.id === currentChatId);
  const history = (chat?.messages || []).slice(-10).map(m => ({
    role: m.sender === "user" ? "user" : "assistant",
    content: m.text
  }));

  const systemPrompt = `You are Dolores, the Nerevions AI assistant. You are intelligent, helpful, friendly, and concise. You can write code in any language, explain concepts, answer questions, help with creative writing, math, science, advice, and any other task. When writing code, always wrap it in triple backticks with the language name. Keep responses clear and well-structured. Your name is Dolores.`;

  let responseText = "";
  let usedAI = false;

  if (apiKey) {
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 15000); // 15s timeout

      const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        signal: controller.signal,
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${apiKey}`,
          "HTTP-Referer": "https://nerevions.github.io",
          "X-Title": "Dolores"
        },
        body: JSON.stringify({
          model: "openrouter/auto",
          messages: [
            { role: "system", content: systemPrompt },
            ...history,
            { role: "user", content: input }
          ],
          max_tokens: 1500
        })
      });

      clearTimeout(timeout);

      if (!res.ok) {
        const errBody = await res.text();
        console.error("OpenRouter error:", res.status, errBody);
        throw new Error(`HTTP ${res.status}: ${errBody}`);
      }
      const data = await res.json();
      console.log("OpenRouter response:", JSON.stringify(data));
      const content = data.choices?.[0]?.message?.content?.trim();
      if (!content) throw new Error("Empty response");
      responseText = content;
      usedAI = true;
      // If we were in fallback mode, notify that we're back
      if (localStorage.getItem("doloresOffline") === "1") {
        localStorage.removeItem("doloresOffline");
        showModeToast("✦ Dolores is back!");
      }

    } catch (err) {
      console.warn("AI unavailable, falling back to KB:", err.message);
      usedAI = false;
    }
  }

  typingDiv.remove();

  if (usedAI) {

    // Detect code block in response
    const codeMatch = responseText.match(/```(\w+)?\n?([\s\S]*?)```/);
    if (codeMatch) {
      const lang = codeMatch[1] || "txt";
      const code = codeMatch[2].trim();
      const textBefore = responseText.slice(0, responseText.indexOf("```")).trim();
      const textAfter = responseText.slice(responseText.lastIndexOf("```") + 3).trim();
      const displayText = (textBefore || "Here's the code:") + (textAfter ? "\n\n" + textAfter : "");
      const extMap = { javascript:"js", js:"js", python:"py", html:"html", css:"css", java:"java", cpp:"cpp", typescript:"ts", ts:"ts", bash:"sh", shell:"sh", go:"go", rust:"rs", sql:"sql", c:"c" };
      const ext = extMap[lang.toLowerCase()] || "txt";
      renderTypingResponse({ text: displayText, file: { name: `dolores_code.${ext}`, content: code } });
    } else {
      renderTypingResponse({ text: responseText });
    }
  } else {
    if (apiKey) {
      // Only show the message once per offline session
      if (localStorage.getItem("doloresOffline") !== "1") {
        localStorage.setItem("doloresOffline", "1");
        showModeToast("Dolores is using a less powerful model for a while");
      }
    }
    const kb = queryKnowledgeBase(input);
    renderTypingResponse({ text: kb.text, file: kb.file });
  }
}

function renderTypingResponse(result) {
  const useAnim = document.getElementById("typingAnimToggle").checked;
  const msgDiv = document.createElement("div");
  msgDiv.className = "doloresMsg";
  document.getElementById("chatContent").appendChild(msgDiv);

  if (useAnim) {
    let built = "";
    const chars = Array.from(result.text);
    let i = 0;
    const interval = setInterval(() => {
      built += chars[i];
      msgDiv.innerText = built;
      i++;
      document.getElementById("chatContent").scrollTop = document.getElementById("chatContent").scrollHeight;
      if (i >= chars.length) {
        clearInterval(interval);
        afterDoloresResponse(result, msgDiv);
      }
    }, 14);
  } else {
    msgDiv.innerText = result.text;
    document.getElementById("chatContent").scrollTop = document.getElementById("chatContent").scrollHeight;
    afterDoloresResponse(result, msgDiv);
  }
}

function afterDoloresResponse(result, msgDiv) {
  if (result.file) renderFileCard(result.file);
  saveMessage("dolores", result.text, result.file || null);
  if (document.getElementById("voiceToggle").checked) speak(result.text);
}

function queryKnowledgeBase(input) {
  const lower = input.toLowerCase();

  if (/^(hi|hello|hey|sup|yo|what'?s up)\b/.test(lower))
    return { text: "Hey! I'm Dolores, your Nerevions assistant. Ask me about coding, science, math, writing, and more! Add your OpenRouter key in Settings for full AI power." };

  if (lower.includes("who are you") || lower.includes("what are you") || lower.includes("your name"))
    return { text: "I'm Dolores, the Nerevions AI assistant! Add your free OpenRouter key in Settings to unlock full AI responses." };

  if (lower.includes("thank"))
    return { text: "You're welcome! Let me know if there's anything else I can help with." };

  const inputWords = lower.split(/\W+/).filter(w => w.length > 2);
  let bestScore = 0, bestKey = null, bestValue = null;

  for (const key in knowledgeBase) {
    const keyWords = key.split(/\s+/);
    let score = 0;
    if (lower.includes(key)) score += 10;
    keyWords.forEach(kw => { if (lower.includes(kw)) score += 3; });
    inputWords.forEach(iw => { if (key.includes(iw)) score += 2; });
    const val = knowledgeBase[key].toLowerCase();
    inputWords.forEach(iw => { if (val.includes(iw)) score += 1; });
    if (score > bestScore) { bestScore = score; bestKey = key; bestValue = knowledgeBase[key]; }
  }

  if (bestScore >= 3 && bestValue) {
    if (bestKey.startsWith("example")) {
      const ext = bestKey.includes("python") ? "py"
                : (bestKey.includes("js") && !bestKey.includes("java")) ? "js"
                : bestKey.includes("html") ? "html"
                : bestKey.includes("css") ? "css"
                : (bestKey.includes("java") && !bestKey.includes("javascript")) ? "java"
                : bestKey.includes("c++") ? "cpp" : "txt";
      return { text: "Here's an example " + bestKey.replace("example ", "") + " file:", file: { name: "example." + ext, content: bestValue } };
    }
    return { text: bestValue };
  }

  return { text: "I don't have that in my knowledge base. Add your free OpenRouter API key in Settings and I'll be able to answer anything!" };
}

// ── File Cards ───────────────────────────────────────────────────
function renderFileCard(file) {
  const container = document.getElementById("chatContent");
  const card = document.createElement("div"); card.className = "fileCard";
  const nameDiv = document.createElement("div"); nameDiv.className = "fileName"; nameDiv.innerText = file.name;
  const actions = document.createElement("div"); actions.className = "fileActions";
  const previewBtn = document.createElement("button"); previewBtn.innerText = "Preview"; previewBtn.onclick = () => openFileEditor(file);
  const downloadBtn = document.createElement("button"); downloadBtn.innerText = "Download"; downloadBtn.onclick = () => downloadFile(file);
  actions.appendChild(previewBtn); actions.appendChild(downloadBtn);
  card.appendChild(nameDiv); card.appendChild(actions);
  container.appendChild(card);
  container.scrollTop = container.scrollHeight;
}

// ── File Editor ──────────────────────────────────────────────────
function openFileEditor(file) {
  currentFile = file;
  document.getElementById("codePanelFilename").innerText = file.name;
  const ext = file.name.split('.').pop().toLowerCase();
  const langLabel = {js:"JavaScript",html:"HTML",css:"CSS",py:"Python",java:"Java",cpp:"C++",txt:"Text"}[ext] || ext;
  document.getElementById("codePanelLang").innerText = langLabel;
  document.getElementById("runOutput").style.display = "none";
  document.getElementById("fileEditorOverlay").style.display = "flex";
  const monacoLang = {js:"javascript",html:"html",css:"css",py:"python",java:"java",cpp:"cpp"}[ext] || "plaintext";
  require(['vs/editor/editor.main'], () => {
    if (editor) editor.dispose();
    editor = monaco.editor.create(document.getElementById('editorContainer'), {
      value: file.content, language: monacoLang, theme: 'vs-dark',
      fontSize: 14, lineHeight: 22, minimap: { enabled: false },
      scrollBeyondLastLine: false, renderLineHighlight: 'line',
      padding: { top: 16, bottom: 16 },
      fontFamily: "'SF Mono','Fira Code','Cascadia Code',monospace", fontLigatures: true,
    });
  });
}

function closeFileEditor() {
  document.getElementById("fileEditorOverlay").style.display = "none";
  if (editor) { editor.dispose(); editor = null; }
}

function runCode() {
  if (!editor || !currentFile) return;
  const code = editor.getValue();
  const ext = currentFile.name.split('.').pop().toLowerCase();
  const outputEl = document.getElementById("runOutput");
  outputEl.style.display = "block";
  if (ext === "html") {
    const blob = new Blob([code], { type: "text/html" });
    window.open(URL.createObjectURL(blob), "_blank");
    outputEl.style.color = "#d38cff"; outputEl.innerText = "▶ Opened HTML in new tab."; return;
  }
  if (ext === "js") {
    const logs = [];
    const origLog = console.log, origErr = console.error;
    console.log = (...a) => logs.push(a.map(x => typeof x === "object" ? JSON.stringify(x) : String(x)).join(" "));
    console.error = (...a) => logs.push("ERROR: " + a.join(" "));
    try {
      new Function(code)();
      outputEl.style.color = "#a0f0a0"; outputEl.innerText = logs.length ? logs.join("\n") : "(no output)";
    } catch(e) {
      outputEl.style.color = "#ff8080"; outputEl.innerText = "Error: " + e.message;
    } finally { console.log = origLog; console.error = origErr; }
    return;
  }
  outputEl.style.color = "#d38cff";
  outputEl.innerText = "▶ Running " + ext.toUpperCase() + " requires a server. Download and run locally.";
}

function downloadFile(file) {
  const a = document.createElement("a");
  a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(file.content);
  a.download = file.name; a.click();
}
function downloadCurrentFile() { if (editor && currentFile) { currentFile.content = editor.getValue(); downloadFile(currentFile); } }
function copyCode() {
  if (editor) {
    navigator.clipboard.writeText(editor.getValue());
    const t = document.getElementById("copiedToast"); t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2000);
  }
}

function showModeToast(msg) {
  const t = document.getElementById("modeToast");
  t.innerText = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

// ── Voice Output ─────────────────────────────────────────────────
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v => /Samantha|Zira|Google UK English Female/i.test(v.name))
                 || voices.find(v => v.lang.startsWith("en") && /female/i.test(v.name))
                 || voices.find(v => v.lang.startsWith("en")) || voices[0];
  if (preferred) utter.voice = preferred;
  utter.rate = 1.0; utter.pitch = 1.1; utter.volume = 1.0;
  window.speechSynthesis.speak(utter);
}

// ── Mic Button (manual voice input) ─────────────────────────────
function toggleMic() {
  if (!document.getElementById("voiceInputToggle").checked) return;
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    alert("Voice input not supported. Try Chrome."); return;
  }
  if (isListening) { micRecognition && micRecognition.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  micRecognition = new SR();
  micRecognition.lang = "en-US"; micRecognition.interimResults = false;
  micRecognition.onstart = () => { isListening = true; document.getElementById("micBtn").classList.add("listening"); };
  micRecognition.onend = () => { isListening = false; document.getElementById("micBtn").classList.remove("listening"); };
  micRecognition.onresult = e => { document.getElementById("userInput").value = e.results[0][0].transcript; askOrSend(); };
  micRecognition.onerror = () => { isListening = false; document.getElementById("micBtn").classList.remove("listening"); };
  micRecognition.start();
}

// ── Wake Word: "Dolores" ─────────────────────────────────────────
function startWakeWordListener() {
  if (!document.getElementById("wakeWordToggle")?.checked) return;
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  wakeRecognition = new SR();
  wakeRecognition.lang = "en-US";
  wakeRecognition.continuous = true;
  wakeRecognition.interimResults = true;

  wakeRecognition.onresult = e => {
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const transcript = e.results[i][0].transcript.toLowerCase().trim();
      if (transcript.includes("dolores")) {
        // Extract the command after "dolores"
        const afterWake = transcript.replace(/.*dolores\s*/i, "").trim();
        showOrb();
        if (afterWake.length > 2) {
          // Command included in the wake phrase — process it
          setTimeout(() => {
            hideOrb();
            if (!inChat) startNewChat(afterWake);
            else sendChatMessage(afterWake);
          }, 800);
        } else {
          // Just wake word — listen for follow-up command
          listenForCommand();
        }
        break;
      }
    }
  };

  wakeRecognition.onend = () => {
    // Restart if wake word listening is still enabled
    if (document.getElementById("wakeWordToggle")?.checked) {
      try { wakeRecognition.start(); } catch(e) {}
    }
  };

  try { wakeRecognition.start(); } catch(e) {}
}

function stopWakeListening() {
  hideOrb();
}

function showOrb() {
  orbVisible = true;
  const orb = document.getElementById("voiceOrb");
  orb.style.display = "flex";
  orb.classList.add("active");
  document.getElementById("orbStatus").innerText = "Listening...";
}

function hideOrb() {
  orbVisible = false;
  const orb = document.getElementById("voiceOrb");
  orb.style.display = "none";
  orb.classList.remove("active");
}

function listenForCommand() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) return;
  document.getElementById("orbStatus").innerText = "Say your question...";
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const cmdRec = new SR();
  cmdRec.lang = "en-US"; cmdRec.interimResults = false;
  cmdRec.onresult = e => {
    const cmd = e.results[0][0].transcript.trim();
    hideOrb();
    if (cmd.length > 1) {
      if (!inChat) startNewChat(cmd);
      else sendChatMessage(cmd);
    }
  };
  cmdRec.onerror = () => hideOrb();
  cmdRec.onend = () => { if (orbVisible) hideOrb(); };
  try { cmdRec.start(); } catch(e) { hideOrb(); }
}
